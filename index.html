<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1f2d42;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent-math: #f59e0b;
    --accent-eng: #34d399;
    --accent-rea: #818cf8;
    --accent-gk: #f472b6;
    --done: #10b981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0f1a2e 0%, #0b1220 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 28px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #f59e0b, #f472b6, #818cf8, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* ─── OVERALL PROGRESS BAR ─── */
  .overall-bar-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 24px 0;
  }
  .overall-bar-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .overall-bar-top span:first-child {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .overall-bar-top span:last-child {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
  }
  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #f59e0b, #f472b6, #818cf8, #34d399);
    transition: width 0.4s ease;
  }

  /* ─── SUBJECT TABS ─── */
  .tabs {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 18px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { border-color: #3b4d6a; color: var(--text); }
  .tab-btn.active { color: #000; font-weight: 600; border-color: transparent; }
  .tab-btn[data-subject="Mathematics"].active { background: var(--accent-math); }
  .tab-btn[data-subject="English"].active { background: var(--accent-eng); }
  .tab-btn[data-subject="Reasoning"].active { background: var(--accent-rea); }
  .tab-btn[data-subject="General Awareness"].active { background: var(--accent-gk); }
  .tab-btn[data-subject="all"].active { background: #e2e8f0; }

  /* ─── MAIN CONTENT ─── */
  .main {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 24px;
  }

  /* ─── SUBJECT BLOCK ─── */
  .subject-block {
    margin-bottom: 36px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .subject-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .subject-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .subject-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
  }
  .subject-progress-chip {
    margin-left: auto;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ─── TOPIC (chapter) ─── */
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .topic-card:hover { border-color: #2d3f5a; }

  .topic-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .topic-checkbox-all {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    accent-color: var(--done);
    flex-shrink: 0;
  }
  .topic-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    flex: 1;
    letter-spacing: 0.1px;
  }
  .topic-mini-progress {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
    margin-right: 8px;
    white-space: nowrap;
  }
  .topic-toggle {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 0.6rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .topic-card.open .topic-toggle { transform: rotate(180deg); }

  /* inline mini progress bar inside topic header */
  .topic-bar {
    width: 60px; height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .topic-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--done);
    transition: width 0.3s;
  }

  /* ─── SUBTOPICS ─── */
  .subtopics {
    display: none;
    padding: 4px 16px 14px 44px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .topic-card.open .subtopics { display: block; }

  .subtopic-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .subtopic-item:last-child { border-bottom: none; }

  .subtopic-cb {
    width: 16px; height: 16px;
    border-radius: 4px;
    margin-top: 1px;
    cursor: pointer;
    accent-color: var(--done);
    flex-shrink: 0;
  }
  .subtopic-label {
    font-size: 0.85rem;
    color: #cbd5e1;
    line-height: 1.4;
    cursor: pointer;
    transition: color 0.15s;
    user-select: none;
  }
  .subtopic-item.checked .subtopic-label {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* ─── SUBJECT COLOURS ─── */
  .Mathematics .subject-icon { background: rgba(245,158,11,0.15); }
  .Mathematics .subject-title { color: var(--accent-math); }
  .Mathematics .subject-progress-chip { color: var(--accent-math); border-color: rgba(245,158,11,0.3); }
  .Mathematics .topic-bar-fill { background: var(--accent-math); }

  .English .subject-icon { background: rgba(52,211,153,0.15); }
  .English .subject-title { color: var(--accent-eng); }
  .English .subject-progress-chip { color: var(--accent-eng); border-color: rgba(52,211,153,0.3); }
  .English .topic-bar-fill { background: var(--accent-eng); }

  .Reasoning .subject-icon { background: rgba(129,140,248,0.15); }
  .Reasoning .subject-title { color: var(--accent-rea); }
  .Reasoning .subject-progress-chip { color: var(--accent-rea); border-color: rgba(129,140,248,0.3); }
  .Reasoning .topic-bar-fill { background: var(--accent-rea); }

  .GeneralAwareness .subject-icon { background: rgba(244,114,182,0.15); }
  .GeneralAwareness .subject-title { color: var(--accent-gk); }
  .GeneralAwareness .subject-progress-chip { color: var(--accent-gk); border-color: rgba(244,114,182,0.3); }
  .GeneralAwareness .topic-bar-fill { background: var(--accent-gk); }

  /* ─── RESET BTN ─── */
  .footer-actions {
    text-align: center;
    margin-top: 40px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 24px;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }
</style>

/* ════════════════════════════════════════════
   STORAGE
   ════════════════════════════════════════════ */
function saveData() {
  const data = {};
  document.querySelectorAll(".subtopic-cb").forEach(cb => { data[cb.id] = cb.checked; });
  localStorage.setItem("ssc_cgl_2026", JSON.stringify(data));
}
function loadData() {
  return JSON.parse(localStorage.getItem("ssc_cgl_2026")) || {};
}
function resetAll() {
  if (!confirm("Reset all progress? This cannot be undone.")) return;
  localStorage.removeItem("ssc_cgl_2026");
  location.reload();
}

/* ════════════════════════════════════════════
   COUNTERS
   ════════════════════════════════════════════ */
function getTopicCounts(topicCard) {
  const boxes = topicCard.querySelectorAll(".subtopic-cb");
  const done = [...boxes].filter(cb => cb.checked).length;
  return { done, total: boxes.length };
}
function updateTopicUI(topicCard) {
  const { done, total } = getTopicCounts(topicCard);
  const pct = total ? (done / total) * 100 : 0;
  topicCard.querySelector(".topic-mini-progress").textContent = `${done}/${total}`;
  topicCard.querySelector(".topic-bar-fill").style.width = pct + "%";
}
function updateSubjectUI(subjectBlock) {
  const boxes = subjectBlock.querySelectorAll(".subtopic-cb");
  const done = [...boxes].filter(cb => cb.checked).length;
  const total = boxes.length;
  subjectBlock.querySelector(".subject-progress-chip").textContent = `${done} / ${total} done`;
}
function updateOverall() {
  const all = document.querySelectorAll(".subtopic-cb");
  const done = [...all].filter(cb => cb.checked).length;
  const total = all.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("overall-pct").textContent = pct + "%";
  document.getElementById("overall-bar").style.width = pct + "%";
}
function updateAll() { updateOverall(); }

/* ════════════════════════════════════════════
   BUILD UI
   ════════════════════════════════════════════ */
function buildUI() {
  const app = document.getElementById("app");
  const saved = loadData();

  SYLLABUS.forEach(subjectData => {
    const safeClass = subjectData.subject.replace(/\s+/g, "");
    const subjectBlock = document.createElement("div");
    subjectBlock.className = `subject-block ${safeClass}`;
    subjectBlock.dataset.subject = subjectData.subject;

    // Subject header
    subjectBlock.innerHTML = `
      <div class="subject-header">
        <div class="subject-icon">${subjectData.icon}</div>
        <div class="subject-title">${subjectData.subject}</div>
        <div class="subject-progress-chip">0 / 0 done</div>
      </div>
    `;

    // Topics
    subjectData.topics.forEach((topic, tIdx) => {
      const topicCard = document.createElement("div");
      topicCard.className = "topic-card";

      const topicHeader = document.createElement("div");
      topicHeader.className = "topic-header";
      topicHeader.innerHTML = `
        <span class="topic-name">${topic.name}</span>
        <span class="topic-mini-progress">0/${topic.subtopics.length}</span>
        <div class="topic-bar"><div class="topic-bar-fill" style="width:0%"></div></div>
        <div class="topic-toggle">▼</div>
      `;

      // Toggle open/close
      topicHeader.addEventListener("click", () => {
        topicCard.classList.toggle("open");
      });

      // Subtopics
      const subtopicsDiv = document.createElement("div");
      subtopicsDiv.className = "subtopics";

      topic.subtopics.forEach((sub, sIdx) => {
        const id = `${safeClass}_t${tIdx}_s${sIdx}`;
        const item = document.createElement("div");
        item.className = "subtopic-item";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.className = "subtopic-cb";
        cb.id = id;
        cb.checked = saved[id] || false;
        if (cb.checked) item.classList.add("checked");

        const lbl = document.createElement("label");
        lbl.className = "subtopic-label";
        lbl.htmlFor = id;
        lbl.textContent = sub;

        cb.addEventListener("change", () => {
          item.classList.toggle("checked", cb.checked);
          updateTopicUI(topicCard);
          updateSubjectUI(subjectBlock);
          updateOverall();
          saveData();
        });

        item.appendChild(cb);
        item.appendChild(lbl);
        subtopicsDiv.appendChild(item);
      });

      topicCard.appendChild(topicHeader);
      topicCard.appendChild(subtopicsDiv);
      subjectBlock.appendChild(topicCard);
      updateTopicUI(topicCard);
    });

    app.appendChild(subjectBlock);
    updateSubjectUI(subjectBlock);
  });

  updateOverall();
}

/* ════════════════════════════════════════════
   TABS
   ════════════════════════════════════════════ */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.subject;
    document.querySelectorAll(".subject-block").forEach(block => {
      block.style.display = (filter === "all" || block.dataset.subject === filter) ? "" : "none";
    });
  });
});

buildUI();
</script>
